name: Scrape photographer emails (US server)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        run: |
          echo "[]" > scripts/photographers.json
          node scripts/scrape-photographers.mjs
        timeout-minutes: 25

      - name: Show results
        if: always()
        run: |
          echo "=== Results ==="
          python3 -c "
          import json
          try:
              data = json.load(open('scripts/photographers.json'))
              print(f'Total leads: {len(data)}')
              for p in data:
                  print(f'  {p[\"city\"]}: {p[\"name\"]} <{p[\"email\"]}>')
          except Exception as e:
              print(f'Error reading: {e}')
          "

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photographers
          path: scripts/photographers.json
          retention-days: 7
